name: Sync with upstream

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        branch: [dev, main]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream ${{ matrix.branch }}
        run: |
          git remote add upstream https://github.com/nextlevelbuilder/goclaw.git
          git fetch upstream --tags --force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge upstream/${{ matrix.branch }} --ff-only
          git push origin ${{ matrix.branch }}
          git push origin --tags || echo "tag push skipped (needs PAT with workflow scope)"

  pr:
    needs: sync
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create/update dev→master PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin dev master
          COMMITS=$(git log --oneline origin/master..origin/dev)
          if [ -z "$COMMITS" ]; then
            echo "master up-to-date with dev, nothing to PR"
            exit 0
          fi
          BODY=$(printf '## Commits to merge into master\n\n```\n%s\n```\n\n_Auto-generated by sync-upstream workflow._' "$COMMITS")
          EXISTING=$(gh pr list --base master --head dev --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --body "$BODY"
            echo "updated PR #$EXISTING"
          else
            gh pr create --base master --head dev --title "chore: sync dev → master" --body "$BODY"
          fi
